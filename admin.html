<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gifted Gown - Admin</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f9f9f9;
      padding: 40px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .header h2 {
      font-size: 24px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header button {
      background-color: #3c4db3;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    th, td {
      padding: 16px;
      text-align: left;
    }

    th {
      background-color: #fafafa;
      font-weight: 600;
    }

    tr:not(:last-child) {
      border-bottom: 1px solid #eee;
    }

    .circle-btn {
      height: 24px;
      width: 24px;
      border-radius: 50%;
      border: 1.5px solid #ccc;
      background: none;
      cursor: pointer;
      margin-right: 6px;
    }

    .form-popup {
      display: none;
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translate(-50%, -20%);
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    .form-popup input {
      display: block;
      margin-bottom: 10px;
      padding: 8px;
      width: 100%;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .form-popup button {
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h2>Gifted Gown</h2>
    <button onclick="openForm()">Add Appointment</button>
  </div>
  <div class="header">
    <h2>Appointments ✏️</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <table id="appointmentsTable">
    <thead>
      <tr>
        <th>Date</th>
        <th>Time</th>
        <th>Client</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <!-- Appointments will be inserted here -->
    </tbody>
  </table>

  <!-- Popup Form -->
  <div class="form-popup" id="formPopup">
    <h3>Add/Edit Appointment</h3>
    <input type="date" id="date" />
    <input type="time" id="time" />
    <input type="text" id="client" placeholder="Client Name" />
    <button id="saveBtn">Save</button>
    <button onclick="closeForm()">Cancel</button>
  </div>

  <script>
    const appointments = [
      { date: "2024-04-23", time: "09:00", client: "John Smith" },
      { date: "2024-04-24", time: "11:00", client: "Emily Johnson" },
      { date: "2024-04-25", time: "14:30", client: "Michael Williams" },
      { date: "2024-04-26", time: "10:00", client: "Sarah Davis" }
    ];

    const isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';

    function formatDate(dateStr) {
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      return new Date(dateStr).toLocaleDateString(undefined, options);
    }

    function formatTime(timeStr) {
      const [hour, minute] = timeStr.split(":");
      const date = new Date();
      date.setHours(hour, minute);
      return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    }

    function renderAppointments() {
      const tbody = document.querySelector("#appointmentsTable tbody");
      tbody.innerHTML = "";
      appointments.forEach((appt, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${formatDate(appt.date)}</td>
          <td>${formatTime(appt.time)}</td>
          <td>${appt.client}</td>
          <td>
            <button class="circle-btn" onclick="openEditForm(${index})">✏️</button>
            <button class="circle-btn" onclick="deleteAppointment(${index})">🗑️</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function openForm() {
      document.getElementById("formPopup").style.display = "block";
      document.getElementById("saveBtn").onclick = addAppointment;
    }

    function closeForm() {
      document.getElementById("formPopup").style.display = "none";
    }

    function logout() {
      localStorage.removeItem('adminLoggedIn');
      window.location.href = 'login.html';
    }

    function addAppointment() {
      if (!isLoggedIn) return alert("Please log in to add appointments.");

      const date = document.getElementById("date").value;
      const time = document.getElementById("time").value;
      const client = document.getElementById("client").value;
      if (date && time && client) {
        appointments.push({ date, time, client });
        renderAppointments();
        closeForm();
      }
    }

    function deleteAppointment(index) {
      if (!isLoggedIn) return alert("Please log in to delete appointments.");
      if (confirm("Delete this appointment?")) {
        appointments.splice(index, 1);
        renderAppointments();
      }
    }

    function openEditForm(index) {
      if (!isLoggedIn) return alert("Please log in to edit appointments.");
      const appt = appointments[index];
      document.getElementById("date").value = appt.date;
      document.getElementById("time").value = appt.time;
      document.getElementById("client").value = appt.client;

      document.getElementById("formPopup").style.display = "block";
      document.getElementById("saveBtn").onclick = function () {
        appointments[index] = {
          date: document.getElementById("date").value,
          time: document.getElementById("time").value,
          client: document.getElementById("client").value
        };
        renderAppointments();
        closeForm();
      };
    }

    renderAppointments();
  </script>

</body>
</html>
